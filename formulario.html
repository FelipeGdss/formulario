<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="container py-5">
        <form>
            <h2 class="mb-3">Endereço de Cobrança</h2>

            <div class="row g-3">
                <div class="col-sm-6">
                    <label for="nome" class="form-label">Primeiro nome</label>
                    <input type="text" id="nome" class="form-control">
                </div>

                <div class="col-sm-6">
                    <label for="senha" class="form-label">Sobrenome</label>
                    <input type="text" id="senha" class="form-control">
                </div>

                <div class="col-12">
                    <label for="cargo" class="form-label">Nome de usuário</label>
                    <div class="input-group">
                        <span class="input-group-text">@</span>
                        <input type="text" id="cargo" class="form-control" placeholder="Usuário">
                    </div>
                </div>

                <div class="col-12">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="email@exemplo.com">
                </div>

                <div class="col-12">
                    <label for="salario" class="form-label">Endereço</label>
                    <input type="text" id="salario" class="form-control" placeholder="Endereço">
                </div>

                <div class="col-md-6">
                    <label for="cidade" class="form-label">País</label>
                    <select id="cidade" class="form-select">
                        <option value="">Escolha</option>
                        <option>Brasil</option>
                        <option>Estados Unidos</option>
                        <option>Alemanha</option>
                        <option>Espanha</option>
                        <option>Russia</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="uf" class="form-label">Estado</label>
                    <select id="uf" class="form-select">
                        <!-- Brasil -->
                        <option>São Paulo</option>

                        <!-- Estados Unidos -->
                        <option>Califórnia</option>

                        <!-- Alemanha -->
                        <option>Baviera</option>

                        <!-- Espanha -->
                        <option>Catalunha</option>

                        <!-- Rússia -->
                        <option>Moscou</option>

                    </select>
                </div>
            </div>

            <hr class="my-4">

            <div class="form-check">
                <input type="checkbox" id="end" class="form-check-input">
                <label for="end" class="form-check-label">O endereço de entrega é o mesmo que o meu endereço de
                    cobrança.</label>
            </div>

            <div class="form-check">
                <input type="checkbox" id="tome" class="form-check-input">
                <label for="tome" class="form-check-label">Guarde esta informação para a próxima vez.</label>
            </div>

            <hr class="my-4">

            <h2 class="mb-3">Pagamento</h2>

            <div class="my-3">
                <div class="form-check">
                    <input type="radio" id="payday" name="metodoPagamento" class="form-check-input" checked>
                    <label for="payday" class="form-check-label">Cartão de crédito</label>
                </div>
                <div class="form-check">
                    <input type="radio" id="deb" name="metodoPagamento" class="form-check-input">
                    <label for="deb" class="form-check-label">Cartão de débito</label>
                </div>
                <div class="form-check">
                    <input type="radio" id="payday" name="metodoPagamento" class="form-check-input">
                    <label for="payday" class="form-check-label">PayPal</label>
                </div>
            </div>

            <div class="row gy-3">
                <div class="col-md-6">
                    <label for="nomeCartao" class="form-label">Nome no cartão</label>
                    <input type="text" id="nomeCartao" class="form-control">
                    <label>Nome completo conforme consta no cartão.</label>
                </div>

                <div class="col-md-6">
                    <label for="numeroCartao" class="form-label">Número do cartão de crédito</label>
                    <input type="text" id="numeroCartao" class="form-control">
                </div>

                <div class="col-md-3">
                    <label for="validade" class="form-label">Validade</label>
                    <input type="text" id="validade" class="form-control" placeholder="MM/AA">
                </div>

                <div class="col-md-3">
                    <label for="cvv" class="form-label">CVV</label>
                    <input type="text" id="cvv" class="form-control">
                </div>
            </div>

            <hr class="my-4">

            <button class="btn btn-primary btn-lg w-100" type="submit">Continuar para o checkout</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
